name: Build Luo World APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip curl \
            build-essential \
            libssl-dev libffi-dev \
            libsqlite3-dev zlib1g-dev \
            libncurses5-dev libreadline-dev \
            libpng-dev libjpeg-dev \
            ccache automake autoconf \
            cmake libtool pkg-config lld \
            python3-dev

      - name: Set up Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      - name: Install buildozer + p4a
        run: |
          pip install --upgrade pip wheel setuptools
          pip install \
            "buildozer==1.5.0" \
            "cython==0.29.37" \
            "python-for-android==2023.9.16" \
            "colorama" \
            "appdirs" \
            "sh>=1.14.1,<2"

      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v4
          restore-keys: |
            buildozer-${{ runner.os }}-v4

      - name: Build APK
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
        run: |
          # Make buildozer output visible AND catch errors
          buildozer -v android debug 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "Buildozer exit code: $BUILD_EXIT"

          echo ""
          echo "=== APK SEARCH ==="
          find . -name "*.apk" 2>/dev/null
          echo "=== BIN DIR ==="
          ls -la bin/ 2>/dev/null || echo "no bin/"
          echo "=== BUILDOZER BIN ==="
          find .buildozer -name "*.apk" 2>/dev/null | head -10 || echo "none"

          if [ "$BUILD_EXIT" != "0" ]; then
            echo "BUILD FAILED — last 100 lines:"
            tail -100 build.log
            exit 1
          fi

      - name: Locate APK
        id: locate_apk
        run: |
          # Try bin/ first (standard buildozer output)
          APK=$(find bin -name "*.apk" 2>/dev/null | head -1)
          # Fall back to inside .buildozer cache
          if [ -z "$APK" ]; then
            APK=$(find .buildozer -name "*.apk" 2>/dev/null | head -1)
          fi
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found after successful build"
            exit 1
          fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK)" >> $GITHUB_OUTPUT
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "APK: $APK ($SIZE)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: luo-world-v0.2-build${{ github.run_number }}
          path: ${{ steps.locate_apk.outputs.apk_path }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.${{ github.run_number }}
          name: "🌿 Luo World v0.2.${{ github.run_number }}"
          body: |
            ## 🎮 Luo World — Session 3 Build #${{ github.run_number }}

            **APK:** `${{ steps.locate_apk.outputs.apk_name }}`
            **Target:** Android ARM64 — Poco X3 NFC ✅
            **Min Android:** 8.0 (API 26)

            ### ⬇️ Install
            1. Download the `.apk` below
            2. Settings → Security → Install unknown apps → **ON**
            3. Open APK → Install → **Play**

            ### 🕹️ Controls
            | Control | Action |
            |---------|--------|
            | Left joystick | Move |
            | Right joystick | Camera orbit |
            | ⚔ | Attack / Chop tree / Hunt |
            | E | Interact / Pick up / Fill cup |
            | USE | Eat food / Drink water |
            | 🎒 | Open inventory |
            | ↑ | Jump |

            ### 🌿 Session 3 — New This Build
            - **Crafting UI** — tap ⚒ CRAFT to open recipe browser (5 categories, all recipes visible, tap CRAFT to make items)
            - **Inventory screen** — 24-slot grid, tap item to equip/use/drop
            - **Live minimap** — top-right corner, tap to expand fullscreen
            - **Sound system** — footsteps, chopping, crafting, eating
            - **Splash screen + icon** — real app icon on your home screen
            - **Sky color** changes with time of day (dawn/day/dusk/night)
            - **Jump button** added to action bar

            ### 🌍 World (unchanged — still massive)
            - 512×512 jungle · 5 biomes · 600 trees · 300 rocks
            - River + 8 ponds · 195 animals · berries · mushrooms
          files: ${{ steps.locate_apk.outputs.apk_path }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure-${{ github.run_number }}
          path: build.log
          retention-days: 7
