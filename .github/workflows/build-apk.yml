name: Build Luo World APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Use the dedicated buildozer Docker action - has everything pre-installed
      # including correct NDK, SDK, Java, and all Kivy dependencies
      - name: Build with Buildozer Action
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: android debug
          buildozer_version: stable

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuoWorld-v0.2-build${{ github.run_number }}
          path: ${{ steps.buildozer.outputs.filename }}
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.${{ github.run_number }}
          name: "🌿 Luo World v0.2.${{ github.run_number }}"
          body: |
            ## 🎮 Luo World — Build #${{ github.run_number }}

            **Target:** Android ARM64 — Poco X3 NFC ✅
            **Min Android:** 8.0 (API 26)

            ### ⬇️ Install
            1. Download `.apk` below
            2. Settings → Security → Install unknown apps → **ON**
            3. Tap APK → Install → **Play**

            ### 🕹️ Controls
            | | |
            |---|---|
            | Left stick | Move |
            | Right stick | Camera |
            | ⚔ | Attack / Chop / Hunt |
            | E | Interact / Pick up / Fill cup |
            | USE | Eat / Drink |
            | 🎒 | Inventory |
            | ↑ | Jump |

            ### 🌿 Sessions 1-4 included
            - 512×512 jungle world · 5 biomes · 600 trees · 300 rocks
            - 195 animals (deer, boar, rabbit, bird) with flee AI
            - Campfire system (place, cook, refuel)
            - Weather: 6 states including storm + lightning
            - Temperature: hypothermia/overheating survival mechanic
            - Full crafting UI + inventory screen + minimap
          files: ${{ steps.buildozer.outputs.filename }}
          token: ${{ secrets.GITHUB_TOKEN }}
