name: Build Luo World APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# CRITICAL: needs write permission to create releases
permissions:
  contents: write
  actions: read

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip curl \
            build-essential \
            libssl-dev libffi-dev \
            libsqlite3-dev \
            zlib1g-dev \
            libncurses5-dev \
            libreadline-dev \
            libpng-dev libjpeg-dev \
            ccache automake autoconf \
            cmake libtool pkg-config \
            lld patchelf

      - name: Set up Android SDK components
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install Python build tools
        run: |
          pip install --upgrade pip wheel
          pip install \
            "buildozer==1.5.0" \
            "cython==0.29.37" \
            "python-for-android==2023.9.16" \
            virtualenv

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.cache/pip
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v2
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653
          export PATH=$PATH:$ANDROID_HOME/platform-tools
          # Run buildozer and capture output
          buildozer -v android debug 2>&1 | tee build.log
          echo "=== BUILD COMPLETE ==="
          echo "APK files:"
          find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Verify APK exists
        run: |
          APK_PATH=$(find . -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            tail -100 build.log
            exit 1
          fi
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "APK_NAME=$(basename $APK_PATH)" >> $GITHUB_ENV
          echo "APK found: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: luo-world-apk
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.${{ github.run_number }}
          name: "🌿 Luo World v0.1.${{ github.run_number }}"
          body: |
            ## 🎮 Luo World APK — Build #${{ github.run_number }}

            **Commit:** `${{ github.sha }}`
            **Target:** Android ARM64 — Poco X3 NFC ✅
            **Min Android:** 8.0 (API 26)

            ### ⬇️ Install
            1. Download the `.apk` file below
            2. On your Poco X3 NFC: Settings → Security → Install unknown apps → ON
            3. Tap the APK to install → Launch **Luo World**

            ### 🕹️ Controls
            | Control | Action |
            |---------|--------|
            | Left joystick | Move |
            | Right joystick | Camera |
            | ⚔ button | Attack / Chop / Mine |
            | E button | Pick up / Interact |
            | USE button | Eat / Drink |
            | 🎒 button | Inventory |

            ### 🌿 What's in this build
            - Massive jungle world (512×512 units — 8x bigger)
            - 600 trees, 300 rocks, 200 vine patches
            - Starting: stone axe + 3x cooked meat + wooden cup
            - Survival: health, hunger, thirst, stamina
            - Chop trees → logs. Mine rocks → stone + flint. Pick up vines
            - Day/night cycle
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure
          path: build.log
          retention-days: 7
