name: Build Luo World APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:3.2.3
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install tools
        run: |
          apt-get update
          apt-get install -y curl unzip

      - name: Download Android export templates
        run: |
          mkdir -p ~/.local/share/godot/templates/3.2.3.stable
          curl -L -o /tmp/export_templates.zip "https://github.com/godotengine/godot/releases/download/3.2.3-stable/Godot_v3.2.3-stable_export_templates.tpz"
          unzip /tmp/export_templates.zip -d /tmp/godot_templates
          cp /tmp/godot_templates/templates/*.apk ~/.local/share/godot/templates/3.2.3.stable/
          ls -la ~/.local/share/godot/templates/3.2.3.stable/

      - name: Configure editor settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-3.tres << 'EOF'
          [gd_resource type="EditorSettings" format=2]

          [resource]
          export/android/adb = "/usr/bin/adb"
          export/android/jarsigner = "/usr/bin/jarsigner"
          export/android/debug_keystore = "/root/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/java_sdk_path = "/usr/lib/jvm/java-17-openjdk-amd64"
          export/android/android_sdk_path = "/usr/lib/android-sdk"
          EOF

      - name: Build Android APK
        run: |
          mkdir -p build/android
          godot --headless --verbose --export-debug "Android" "build/android/LuoWorld.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuoWorld-APK-build${{ github.run_number }}
          path: build/android/LuoWorld.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "🌿 Luo World v1.0.${{ github.run_number }}"
          body: |
            ## 🎮 Luo World APK — Build #${{ github.run_number }}
            **Engine:** Godot 3.2.3 · **Target:** Android ARM64+ARM32 · Poco X3 NFC ✅

            ### ⬇️ Install
            1. Download `LuoWorld.apk` below
            2. Settings → Security → Install unknown apps → ON
            3. Tap APK → Install → Play

            ### 🕹️ Controls
            Left stick = Move · Right stick = Camera
            ⚔ = Attack/Chop · E = Interact · USE = Eat/Drink · 🎒 = Inventory
          files: build/android/LuoWorld.apk
          token: ${{ secrets.GITHUB_TOKEN }}
