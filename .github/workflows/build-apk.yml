name: Build Luo World APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip ant \
            build-essential libssl-dev libffi-dev \
            libsqlite3-dev zlib1g-dev libncurses5-dev \
            libreadline-dev libpng-dev libjpeg-dev \
            ccache automake autoconf cmake libtool pkg-config lld

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install \
            "Cython==0.29.33" \
            "buildozer==1.5.0" \
            "sh==1.14.3" \
            "appdirs==1.4.4" \
            "colorama==0.4.6" \
            "python-for-android==2023.9.16" \
            "jinja2" "meson" "ninja" "toml" "packaging"
          pip install "sh==1.14.3" --force-reinstall
          pip config set global.break-system-packages true

      - name: Pre-populate buildozer SDK/NDK paths
        run: |
          # Buildozer ignores $ANDROID_HOME and looks in ~/.buildozer/
          # Symlink the pre-installed SDK and NDK there so it never downloads
          mkdir -p ~/.buildozer/android/platform

          # SDK symlink
          ln -sf $ANDROID_HOME ~/.buildozer/android/platform/android-sdk

          # NDK: pre-install r25c and symlink
          # $ANDROID_HOME/ndk/25.2.9519653 is already installed by setup step below
          # We'll do the SDK setup first, then symlink NDK after

          # Ant symlink (so buildozer doesn't download it)
          ln -sf /usr/share/ant ~/.buildozer/android/platform/apache-ant-1.9.4

          echo "=== Buildozer platform dir ==="
          ls -la ~/.buildozer/android/platform/

      - name: Configure Android SDK and NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"
          echo "NDK installed at: $ANDROID_HOME/ndk/25.2.9519653"
          # NOW symlink NDK using release name (25c) which buildozer expects
          ln -sf $ANDROID_HOME/ndk/25.2.9519653 ~/.buildozer/android/platform/android-ndk-r25c
          echo "=== NDK symlink ==="
          ls -la ~/.buildozer/android/platform/android-ndk-r25c/

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v11
          restore-keys: buildozer-${{ runner.os }}-v11

      - name: Build APK
        id: build
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          JAVA_HOME: ${{ env.JAVA_HOME }}
          PIP_BREAK_SYSTEM_PACKAGES: "1"
        run: |
          # NO "yes |" — it breaks urllib downloads with broken pipe
          buildozer -v android debug 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}

          echo "=== Build exit: $BUILD_EXIT ==="
          find bin -name "*.apk" 2>/dev/null || find .buildozer -name "*.apk" 2>/dev/null || echo "No APK found"

          APK=$(find bin -name "*.apk" 2>/dev/null | head -1)
          [ -z "$APK" ] && APK=$(find .buildozer -name "*.apk" 2>/dev/null | grep -v unsigned | head -1)

          if [ -n "$APK" ]; then
            echo "apk_path=$APK" >> $GITHUB_OUTPUT
          else
            tail -100 build.log
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuoWorld-APK-build${{ github.run_number }}
          path: ${{ steps.build.outputs.apk_path }}
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.${{ github.run_number }}
          name: "🌿 Luo World v0.2.${{ github.run_number }}"
          body: |
            ## 🎮 Luo World APK — Build #${{ github.run_number }}
            **Target:** Android ARM64 + ARM32 (API 21-33) · Poco X3 NFC ✅

            ### Install
            1. Download APK below
            2. Settings → Security → Install unknown apps → ON
            3. Tap APK → Install → Play
          files: ${{ steps.build.outputs.apk_path }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7
