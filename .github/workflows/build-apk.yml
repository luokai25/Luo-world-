name: Build Luo World APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            build-essential \
            libssl-dev libffi-dev \
            libsqlite3-dev zlib1g-dev \
            libncurses5-dev libreadline-dev \
            libpng-dev libjpeg-dev \
            ccache automake autoconf \
            cmake libtool pkg-config lld

      - name: Configure Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install \
            "Cython==0.29.33" \
            "buildozer==1.5.0" \
            "python-for-android==2023.9.16" \
            "sh==1.14.3" \
            "appdirs==1.4.4" \
            "colorama==0.4.6"

      - name: Verify environment
        run: |
          echo "=== Java ===" && java -version && javac -version
          echo "=== Python ===" && python3 --version
          echo "=== Cython ===" && cython --version
          echo "=== Buildozer ===" && buildozer version
          echo "=== NDK ===" && ls $ANDROID_HOME/ndk/
          echo "=== Build tools ===" && ls $ANDROID_HOME/build-tools/
          echo "=== spec ===" && cat buildozer.spec

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v8
          restore-keys: buildozer-${{ runner.os }}-v8

      - name: Build APK
        id: build
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          set -o pipefail
          yes | buildozer -v android debug 2>&1 | tee build.log || true
          echo "=== LAST 300 LINES OF BUILD LOG ===" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -300 build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Now check if APK was produced
          APK=$(find . -name "*.apk" | grep -v "\.buildozer/android/platform" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find .buildozer -name "*.apk" 2>/dev/null | head -1)
          fi
          if [ -z "$APK" ]; then
            echo "BUILD FAILED - no APK found"
            echo "=== FULL ERRORS ===" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -i "error\|exception\|traceback\|failed" build.log | tail -50 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "APK built: $APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LuoWorld-APK-build${{ github.run_number }}
          path: ${{ steps.build.outputs.apk_path }}
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.${{ github.run_number }}
          name: "🌿 Luo World v0.2.${{ github.run_number }}"
          body: |
            ## 🎮 Luo World APK — Build #${{ github.run_number }}
            **Target:** Android ARM64 + ARM32 · API 21-33 · Poco X3 NFC ✅
            Download the APK below, enable unknown sources, install and play.
          files: ${{ steps.build.outputs.apk_path }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7
