name: Build Luo World APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-22.04
    # Use the official Kivy buildozer Docker image
    # Same approach as barichello/godot-ci - everything pre-installed
    container:
      image: kivy/buildozer:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log
          echo "=== APK search ==="
          find . -name "*.apk" 2>/dev/null

      - name: Find APK path
        id: find_apk
        run: |
          APK=$(find bin -name "*.apk" 2>/dev/null | head -1)
          [ -z "$APK" ] && APK=$(find .buildozer -name "*.apk" 2>/dev/null | grep -v unsigned | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found"
            tail -80 build.log
            exit 1
          fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LuoWorld-APK-build${{ github.run_number }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.${{ github.run_number }}
          name: "🌿 Luo World v0.2.${{ github.run_number }}"
          body: |
            ## 🎮 Luo World APK — Build #${{ github.run_number }}
            **Target:** Android ARM64 + ARM32 · API 21-33 · Poco X3 NFC ✅

            ### Install
            1. Download APK below
            2. Settings → Security → Install unknown apps → ON
            3. Tap APK → Install → Play

            ### Controls
            Left stick = Move · Right stick = Camera · ⚔ = Attack/Chop
            E = Interact · USE = Eat/Drink · 🔥 = Campfire · 🎒 = Inventory
          files: ${{ steps.find_apk.outputs.apk_path }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7
