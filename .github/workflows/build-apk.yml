name: Build Luo World APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip ant \
            build-essential libssl-dev libffi-dev \
            libsqlite3-dev zlib1g-dev libncurses5-dev \
            libreadline-dev libpng-dev libjpeg-dev \
            ccache automake autoconf cmake libtool pkg-config lld

      - name: Configure Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" "platforms;android-33" \
            "build-tools;33.0.2" "ndk;25.2.9519653"

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install \
            "Cython==0.29.33" \
            "buildozer==1.5.0" \
            "sh==1.14.3" \
            "appdirs==1.4.4" \
            "colorama==0.4.6"
          pip config set global.break-system-packages true
          pip install \
            "python-for-android==2023.9.16" \
            "jinja2" "meson" "ninja" "toml" "packaging"
          pip install "sh==1.14.3" --force-reinstall

      - name: Pre-link ant
        run: |
          mkdir -p ~/.buildozer/android/platform
          ln -sf /usr/share/ant ~/.buildozer/android/platform/apache-ant-1.9.4

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v10
          restore-keys: buildozer-${{ runner.os }}-v10

      - name: Build APK
        id: build
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          JAVA_HOME: ${{ env.JAVA_HOME }}
          PIP_BREAK_SYSTEM_PACKAGES: "1"
        run: |
          set -o pipefail
          yes | buildozer -v android debug 2>&1 | tee build.log || true
          
          APK=$(find bin -name "*.apk" 2>/dev/null | head -1)
          [ -z "$APK" ] && APK=$(find .buildozer -name "*.apk" 2>/dev/null | grep -v "unsigned" | head -1)
          
          if [ -n "$APK" ]; then
            echo "apk_path=$APK" >> $GITHUB_OUTPUT
            echo "APK_FOUND=true" >> $GITHUB_ENV
          else
            echo "APK_FOUND=false" >> $GITHUB_ENV
            # Push log to gist so we can read it
            LOG_CONTENT=$(tail -200 build.log | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/json" \
              "https://api.github.com/gists" \
              -d "{\"description\":\"Luo World build log #${{ github.run_number }}\",\"public\":true,\"files\":{\"build-log.txt\":{\"content\":$LOG_CONTENT}}}" \
              > /tmp/gist_response.json
            GIST_URL=$(python3 -c "import json; print(json.load(open('/tmp/gist_response.json')).get('html_url','failed'))")
            echo "GIST_URL=$GIST_URL" >> $GITHUB_ENV
            echo "Build log gist: $GIST_URL"
            exit 1
          fi

      - name: Upload APK
        if: env.APK_FOUND == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: LuoWorld-APK-build${{ github.run_number }}
          path: ${{ steps.build.outputs.apk_path }}
          retention-days: 30

      - name: Create Release
        if: env.APK_FOUND == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.${{ github.run_number }}
          name: "🌿 Luo World v0.2.${{ github.run_number }}"
          body: |
            ## 🎮 Luo World APK — Build #${{ github.run_number }}
            **Target:** Android ARM64 + ARM32 (API 21-33) · Poco X3 NFC ✅
            Download APK below → Enable unknown sources → Install → Play
          files: ${{ steps.build.outputs.apk_path }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7
